name: Run script hourly

on:
  push:
    tags:
      - '*'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm i

      - name: Run node script
        run: node script.ts

      - name: Upload artifacts to a new release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            clash-whitelist.yaml
            sing-whitelist.json
            geosite-cheburnet.yaml

      - name: Delete old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_TAGS=$(gh release list --limit 100 --json tagName --jq '.[1:][].tagName')
          echo "$OLD_TAGS" | while read -r TAG; do
              echo "Deleting $TAG"
              gh release delete "$TAG" --yes --cleanup-tag
          done
